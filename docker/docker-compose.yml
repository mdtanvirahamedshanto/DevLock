version: "3.9"

services:
  # ==========================================================================
  # Infrastructure
  # ==========================================================================
  mongodb:
    image: mongo:7
    container_name: devlock-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo/init-replica.js:/docker-entrypoint-initdb.d/init-replica.js
    command: ["--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "rs.status()"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: devlock-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: devlock-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - gateway
      - websocket
      - dashboard

  # ==========================================================================
  # Application Services
  # ==========================================================================
  gateway:
    build:
      context: ../
      dockerfile: apps/gateway/Dockerfile
    container_name: devlock-gateway
    ports:
      - "3000:3000"
    env_file: ../.env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  license-service:
    build:
      context: ../
      dockerfile: apps/license-service/Dockerfile
    container_name: devlock-license
    ports:
      - "3001:3001"
    env_file: ../.env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  config-service:
    build:
      context: ../
      dockerfile: apps/config-service/Dockerfile
    container_name: devlock-config
    ports:
      - "3002:3002"
    env_file: ../.env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  identity-service:
    build:
      context: ../
      dockerfile: apps/identity-service/Dockerfile
    container_name: devlock-identity
    ports:
      - "3004:3004"
    env_file: ../.env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  websocket:
    build:
      context: ../
      dockerfile: apps/websocket-gateway/Dockerfile
    container_name: devlock-websocket
    ports:
      - "3010:3010"
    env_file: ../.env
    depends_on:
      redis:
        condition: service_healthy

  queue-worker:
    build:
      context: ../
      dockerfile: apps/queue-worker/Dockerfile
    container_name: devlock-worker
    env_file: ../.env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    build:
      context: ../
      dockerfile: apps/dashboard/Dockerfile
    container_name: devlock-dashboard
    ports:
      - "4000:3000"
    env_file: ../.env
    depends_on:
      - gateway

volumes:
  mongo_data:
  redis_data:
